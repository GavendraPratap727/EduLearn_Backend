services:
  # AuthService
  - type: web
    name: EduLearn-AuthService
    env: docker
    repo: https://github.com/GavendraPratap727/EduLearn_Backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: EduLearn
      - key: Jwt__Audience
        value: EduLearnUsers
      - key: DefaultConnection
        value: Server=postgres;Database=edulearn_auth;User Id=postgres;Password=postgres;
    autoDeploy: true

  # CourseService
  - type: web
