services:
  # AuthService
  - type: web
    name: edulearn-auth-service
    runtime: docker
    plan: free
    healthCheckPath: /api/auth/health
    dockerContext: .
    envVars:
      - key: SERVICE_NAME
        value: AuthService
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__SecretKey
        value: edulearn-super-secret-key-2024-microservices-architecture
      - key: Jwt__Issuer
        value: EduLearn
      - key: Jwt__Audience
        value: EduLearnUsers
      - key: DefaultConnection
        fromDatabase:
          name: edulearn-db
          property: connectionString
      - key: RabbitMQ__HostName
        value: gerbil.rmq.cloudamqp.com
      - key: RabbitMQ__Port
        value: 5672
      - key: RabbitMQ__UserName
        value: dwnjeedx
      - key: RabbitMQ__Password
        value: ZxxY8_y7zOUpfzXtQ88ZRI1Tx8RlrYQe
      - key: RabbitMQ__VirtualHost
        value: dwnjeedx
    autoDeploy: true

