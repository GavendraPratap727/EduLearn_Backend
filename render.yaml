services:
  # AuthService
  - type: web
    name: edulearn-auth-service
    env: docker
    dockerCommand: dotnet ./auth/EduLearn.AuthService.dll --urls http://0.0.0.0:$PORT
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: EduLearn
      - key: Jwt__Audience
        value: EduLearnUsers
      - key: ConnectionStrings__DefaultConnection
        value: Host=dpg-d81pf3gg4nts738b096g-a;Database=edulearn_rdal;Username=edulearn_rdal_user;Password=Q0CrP8xeOR8JmA5Rgglxg0x2bhvNBuYW;Port=5432;SSL Mode=Prefer;
      - key: RabbitMQ__HostName
        value: gerbil.rmq.cloudamqp.com
      - key: RabbitMQ__Port
        value: 5672
      - key: RabbitMQ__UserName
        value: dwnjeedx
      - key: RabbitMQ__Password
        value: ZxxY8_y7zOUpfzXtQ88ZRI1Tx8RlrYQe
      - key: RabbitMQ__VirtualHost
        value: dwnjeedx
    autoDeploy: true

